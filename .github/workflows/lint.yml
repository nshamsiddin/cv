name: Proofread (textidote)

# Advisory spell + style check on the resume prose. Runs textidote (a
# LaTeX-aware checker) over resume.tex and uploads an HTML report. It never
# fails the build — flags are suggestions to review, not errors.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  textidote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run textidote
        run: |
          curl -sL -o textidote.jar \
            https://github.com/sylvainhalle/textidote/releases/latest/download/textidote.jar
          # --dict: allow domain vocabulary (Flink, Kinesis, ...) so tech terms
          # aren't flagged as misspellings.
          # --ignore: rules that misfire on dotted tech names / degree abbrevs.
          OPTS="--check en --dict dict.txt --ignore sh:d:002,lt:en:BACHELOR_ABBR"
          # HTML report (artifact) — exit code is the warning count, so don't fail.
          java -jar textidote.jar $OPTS --output html resume.tex > textidote-report.html || true
          # Human-readable summary in the run log.
          java -jar textidote.jar $OPTS resume.tex || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: textidote-report
          path: textidote-report.html
          if-no-files-found: warn
