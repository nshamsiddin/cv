name: Spell check

# Advisory spell check on the RENDERED resume text (not the LaTeX source, which
# would trip on custom macros). Compiles the PDF, extracts its text, and lists
# any word that is neither in the English dictionary nor in dict.txt (the
# project allowlist of names / tech terms). Never fails the build — the list is
# for you to eyeball for typos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  spell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile resume.tex -> resume.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Spell-check rendered text
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils aspell aspell-en
          pdftotext resume.pdf - \
            | aspell --lang=en --mode=none list \
            | sort -u \
            | grep -vixFf dict.txt > unknown-words.txt || true
          echo "=== Words not in the dictionary or dict.txt (review for typos) ==="
          if [ -s unknown-words.txt ]; then cat unknown-words.txt; else echo "(none)"; fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: spell-report
          path: unknown-words.txt
          if-no-files-found: warn
