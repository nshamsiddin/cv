name: Publish to GitHub Pages

# Compile the resume and publish it to GitHub Pages on every push to main.
# Publishes via the classic gh-pages branch (reliable), which Pages then serves:
#   https://nshamsiddin.github.io/cv/            -> web view (index.html + PDF)
#   https://nshamsiddin.github.io/cv/resume.pdf  -> the PDF (stable URL)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # to push the built site to the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate template variant sources
        run: |
          python3 - <<'PY'
          import re
          for t in ["modern", "minimal", "compact"]:
              s = open("resume.tex").read()
              s = re.sub(r'\\documentclass(\[[^\]]*\])?\{cv\}',
                         r'\\documentclass[%s]{cv}' % t, s, count=1)
              open("resume-%s.tex" % t, "w").write(s)
          PY

      - name: Compile default + all templates
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            resume.tex
            resume-modern.tex
            resume-minimal.tex
            resume-compact.tex

      - name: Assemble site (+ inject JSON-LD from resume.json)
        run: |
          mkdir -p site
          cp resume.pdf resume-modern.pdf resume-minimal.pdf resume-compact.pdf site/
          cp resume.json site/resume.json
          cp .github/pages/index.html site/index.html
          python3 - <<'PY'
          import json
          r = json.load(open("resume.json"))
          b = r["basics"]
          loc = b.get("location", {})
          person = {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": b["name"],
            "jobTitle": b.get("label"),
            "email": "mailto:" + b.get("email", ""),
            "url": b.get("url"),
            "description": b.get("summary"),
            "address": {
              "@type": "PostalAddress",
              "addressLocality": loc.get("city"),
              "addressRegion": loc.get("region"),
              "addressCountry": loc.get("countryCode"),
            },
            "sameAs": [p["url"] for p in b.get("profiles", [])],
            "alumniOf": [{"@type": "CollegeOrUniversity", "name": e["institution"]} for e in r.get("education", [])],
            "worksFor": {"@type": "Organization", "name": r["work"][0]["name"]} if r.get("work") else None,
            "knowsAbout": [k for s in r.get("skills", []) for k in s.get("keywords", [])],
            "knowsLanguage": [l["language"] for l in r.get("languages", [])],
          }
          block = '<script type="application/ld+json">\n' + json.dumps(person, indent=2) + '\n</script>'
          html = open("site/index.html").read().replace("<!--JSONLD-->", block, 1)
          open("site/index.html", "w").write(html)
          print("Injected JSON-LD for", b["name"])
          PY

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
