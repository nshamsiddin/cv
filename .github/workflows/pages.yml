name: Publish to GitHub Pages

# Compile the resume and publish it to GitHub Pages on every push to main.
# Publishes via the classic gh-pages branch (reliable), which Pages then serves:
#   https://nshamsiddin.github.io/cv/            -> web view (index.html + PDF)
#   https://nshamsiddin.github.io/cv/resume.pdf  -> the PDF (stable URL)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # to push the built site to the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile resume.tex -> resume.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Assemble site
        run: |
          mkdir -p site
          cp resume.pdf site/resume.pdf
          cp .github/pages/index.html site/index.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
