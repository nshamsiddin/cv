name: Publish to GitHub Pages

# Compile the resume and publish it to GitHub Pages on every push to main.
# Result: a permanent, always-latest link — https://nshamsiddin.github.io/cv
#   /            -> web view (index.html embeds the PDF)
#   /resume.pdf  -> the PDF itself (stable URL for applications)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile resume.tex -> resume.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Assemble site
        run: |
          mkdir -p site
          cp resume.pdf site/resume.pdf
          cp .github/pages/index.html site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
