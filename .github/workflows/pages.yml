name: Publish to GitHub Pages

# Compile the resume and publish it to GitHub Pages on every push to main.
# Publishes via the classic gh-pages branch (reliable), which Pages then serves:
#   https://nshamsiddin.github.io/cv/            -> web view (index.html + PDF)
#   https://nshamsiddin.github.io/cv/resume.pdf  -> the PDF (stable URL)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # to push the built site to the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate template variant sources
        run: |
          python3 - <<'PY'
          import re
          for t in ["modern", "minimal", "compact"]:
              s = open("resume.tex").read()
              s = re.sub(r'\\documentclass(\[[^\]]*\])?\{cv\}',
                         r'\\documentclass[%s]{cv}' % t, s, count=1)
              open("resume-%s.tex" % t, "w").write(s)
          PY

      - name: Compile default + all templates
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            resume.tex
            resume-modern.tex
            resume-minimal.tex
            resume-compact.tex

      - name: Assemble site
        run: |
          mkdir -p site
          cp resume.pdf resume-modern.pdf resume-minimal.pdf resume-compact.pdf site/
          cp .github/pages/index.html site/index.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
