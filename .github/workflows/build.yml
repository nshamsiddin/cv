name: Build resume PDF

# Build the PDF from resume.tex.
#   - Push to main / PR: compile and upload the PDF as a workflow artifact
#     (a build check — catches LaTeX errors before you tag).
#   - Version tag (v1.0, v1.1, ...): also attach the PDF to a GitHub Release.
#   - Manual run (Actions -> Run workflow): pick a FONT from a dropdown and,
#     optionally, a tag to publish a Release with that font's PDF.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      template:
        description: "Template / layout"
        type: choice
        default: classic
        options: [classic, modern, minimal, compact]
      font:
        description: "Font"
        type: choice
        default: lmodern
        options: [lmodern, charter, palatino, times, helvet, sourcesans, lato]
      release_tag:
        description: "Optional: publish a Release at this tag with the built PDF (e.g. v1.3). Leave blank to just build an artifact."
        type: string
        default: ""

permissions:
  contents: write   # required to create/attach Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply template + font choice (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        env:
          TEMPLATE: ${{ inputs.template }}
          FONT: ${{ inputs.font }}
        run: |
          python3 - <<'PY'
          import os, re
          opts = "%s,%s" % (os.environ["TEMPLATE"], os.environ["FONT"])
          src = open("resume.tex").read()
          src = re.sub(r'\\documentclass(\[[^\]]*\])?\{cv\}',
                       r'\\documentclass[%s]{cv}' % opts, src, count=1)
          open("resume.tex", "w").write(src)
          PY
          echo "Building with template+font: $TEMPLATE,$FONT"
          grep documentclass resume.tex

      - name: Compile resume.tex -> resume.pdf
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Enforce one page
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
          n=$(pdfinfo resume.pdf | awk '/^Pages:/{print $2}')
          echo "resume.pdf has $n page(s)"
          if [ "$n" -gt 1 ]; then
            echo "::error::Resume is $n pages — keep it to 1. Tighten content or use the 'compact' template."
            exit 1
          fi

      - name: Upload PDF as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}', inputs.template, inputs.font) || 'default' }}-pdf
          path: resume.pdf
          if-no-files-found: error

      - name: Attach PDF to Release (version tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: resume.pdf
          generate_release_notes: true

      - name: Publish Release (manual run with a release_tag)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: resume.pdf
          generate_release_notes: true
